services:
  web:
    build:
      context: .
      target: dev
    working_dir: /app
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0"
    ports:
      - "4321:4321"
    environment:
      PUBLIC_ANIMATION_LIBRARY_ENABLED: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - ./media/animations/previews:/app/public/animation-previews

  preview:
    build:
      context: .
      target: base
    working_dir: /app
    command: sh -c "pnpm install && pnpm build && pnpm preview --host 0.0.0.0"
    ports:
      - "4322:4321"
    environment:
      PUBLIC_ANIMATION_LIBRARY_ENABLED: "true"
    profiles:
      - preview
    volumes:
      - .:/app
      - /app/node_modules
      - ./media/animations/previews:/app/public/animation-previews
